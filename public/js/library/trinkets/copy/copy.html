<div id="trinket-overview" class="row">
  <section ng-show="canSave" class="page-menu">
    <section class="options-right">
      <a class="button small primary" ng-click="save()"><i class="fa fa-save"></i> save</a>
      <a class="button small caution"  ng-click="cancel()">cancel</a>
    </section>
    <div class="spacer"></div>
    <nav class="breadcrumbs">
      <a href="/home"><i class="fa fa-home"></i></a>
      <a ui-sref="list">My Trinkets</a>
      <a class="current">
        <span editable-text="name"
              e-maxlength="50"
              buttons="no"
              blur="submit">{{ name || 'Untitled' }}</span>
      </a>
    </nav>
  </section>
  <section id="embed-code" ng-class="{'medium':trinket.lang == 'music', 'large':trinket.lang != 'music'}">
    <iframe ng-src="{{iframeUrl}}" width="100%" height="100%" frameborder="0" marginwidth="0" marginheight="0" allowfullscreen embed-api run-mode="runMode" is-modified="isModified" api="trinketApi"></iframe>
  </section>
</div>
