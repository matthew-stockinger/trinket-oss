<p ng-show="!interactions">
  <i class="fa fa-spinner fa-spin"></i> Loading...
</p>
<table id="interactionsTable" ng-show="interactions && interactions.length">
  <tbody>
    <tr ng-repeat="interaction in interactions">
      <td>
         {{ interactionMap[interaction.action] }} {{ interaction.interacted | formatDate }}
         <span ng-if='interaction.referer_host'>
           from <a href='{{ interaction.referer }}' target='_blank'>{{ interaction.referer_host }}</a>
         </span>
      </td>
    </tr>
  </tbody>
</table>
<p ng-show="interactions && !interactions.length">
  There haven't been any recorded interactions with this trinket yet.<br />
  Try <a ui-sref="detail.embed">adding it to your site</a> or <a ui-sref="detail.share">sharing it with others</a> to increase interactions.
</p>
