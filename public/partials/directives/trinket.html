<div class="dropdown-wrapper">
  <a class="small button primary dropdown" data-dropdown="{{id}}"><span class="show-for-large-up">New Trinket</span><i class="hide-for-large-up trinket-key"></i></a>
  <ul id="{{id}}" class="tiny f-dropdown" data-dropdown-content>
    <li ng-repeat="item in items">
      <a ng-click="create(item.lang)"><i class="lang-sprite lang-sprite-{{item.lang}}"></i>{{item.label}} <i ng-show="item.icon" class="{{item.icon}}"></i></a>
    </li>
  </ul>
</div>
