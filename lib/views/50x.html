<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Something went wrong</title>
    <link href="//fonts.googleapis.com/css?family=Lato:300,900|Merriweather:300,400italic,900" rel="stylesheet" type="text/css">
    <style>
        html { padding: 40px 0; }
        body { text-align: center; font-family: "Merriweather", serif; }
        h1, h2, h3 { font-family: "Lato", sans-serif; font-weight: 900; line-height: 1.4; margin: 0; }
        h1 { font-size: 2.75rem; }
        h1 span { color: #CCC; }
        .subheader {
          line-height: 1.6;
          color: #6f6f6f;
          font-weight: 300;
          margin-top: 0.2rem;
          margin-bottom: 0.5rem;
        }
        a {
          color: #008AFF;
          text-decoration: none;
        }
        a:hover { color: #0665b5; }
        hr {
          border: solid #ddd;
          border-width: 1px 0 0;
          clear: both;
          margin: 1.25rem 0 1.1875rem;
          height: 0;
        }
        .nav-link {
          display: inline-block;
          margin-top: 2rem;
          padding: 0.75rem 1.5rem;
          background: #008AFF;
          color: white;
          border-radius: 4px;
          font-family: "Lato", sans-serif;
          font-weight: 900;
        }
        .nav-link:hover {
          background: #0665b5;
          color: white;
        }
    </style>
</head>
<body>
  <h1>Something went wrong <span>:(</span></h1>
  <hr>
  <p class="subheader">We encountered an unexpected error. Please try again later.</p>
  {% if config.app.supportEmail %}
  <p class="subheader">If this problem persists, please contact <a href="mailto:{{ config.app.supportEmail }}">{{ config.app.supportEmail }}</a>.</p>
  {% endif %}
  <a href="/" class="nav-link">Go to Homepage</a>
</body>
</html>
