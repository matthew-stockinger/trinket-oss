<div id="uploadModal" class="reveal-modal medium" data-reveal>
  <h2>Upload a Blocks XML file</h2>
  <p class="lead">The XML file must have been downloaded from another trinket.</p>
  <label for="blocks-upload" class="small button">Choose A File</label>
  <input type="file" name="blocks_upload" id="blocks-upload" class="show-for-sr">
  <span id="blocks-upload-filename">[No file selected]</span>
  <br />
  <a class="menu-button small button primary blocks-button disabled" data-action="code.replace-blocks">Replace Existing Blocks</a>
  <a class="menu-button small button primary blocks-button disabled" data-action="code.add-blocks">Add New Blocks</a>
  <div id="uploadMessage" class="hide"></div>
  <a class="close-reveal-modal">&#215;</a>
</div>
