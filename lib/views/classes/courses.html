{% extends "base.html" %}

{% block body_class %}course{% endblock %}

{% block content %}
<div class='row'>
  <h1>{{instructor.name}} Courses</h1>
  <ul>
    {% for course in courses %}
    <li><a href='{{ host(instructor) }}{{ subdomain(instructor, course) }}'>{{course.name}}</a></li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
