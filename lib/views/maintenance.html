<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Scheduled Maintenance</title>
    <link rel="icon" href="/img/icons/favicon.ico" type="image/x-icon">
    <link href="//fonts.googleapis.com/css?family=Lato:300,900|Merriweather:300,400italic,900" rel="stylesheet" type="text/css">
    <style>
        html { padding: 40px 0; }
        body { text-align: center; font-family: "Merriweather", serif;  }
        h1, h2, h3 { font-family: "Lato", sans-serif; font-weight: 900; line-height: 1.4; margin: 0; }
        h1 { font-size: 2.75rem; }
        h2 { font-size: 2.3125rem; }
        h3 { font-family: "Merriweather", serif; font-size: 1.375rem; }
        .subheader {
          line-height: 1.6;
          color: #6f6f6f;
          font-weight: 300;
          margin-top: 0.2rem;
          margin-bottom: 0.5rem;
        }
        a {
          color: #008AFF;
          text-decoration: none;
        }
        a:hover { color: #0665b5; }
        hr {
          border: solid #ddd;
          border-width: 1px 0 0;
          clear: both;
          margin: 1.25rem 0 1.1875rem;
          height: 0;
        }
    </style>
</head>
<body>
  <h1>Scheduled Maintenance</h1>
  <hr>
  <p class="subheader">The site is currently unavailable for scheduled maintenance. Please try again soon.</p>
  <p class="subheader">We apologize for any inconvenience.</p>
</body>
