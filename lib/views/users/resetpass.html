{% extends "base.html" %}

{% block content %}
  <div class="row">
    <div class="large-12 columns">
      <h1>Enter your new password.</h2>
      <form action="/save-pass" method="post">
        <input type="hidden" name="key" value="{{ key }}"/>
        <input type="password" name="password" placeholder="Password" required/>
        <input type="password" name="password_verify" placeholder="Re-enter Password" required/>
        <input class="button" type="submit" value="change password"/>
      </form>
    </div>
  </div>
{% endblock %}
