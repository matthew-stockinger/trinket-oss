{% if user.password %}
<form id="change-password" method="post">
  <div id="passwordError" data-alert class="alert-box alert hide-override">
    <span id="message"></span>
  </div>
  <div id="passwordSuccess" data-alert class="alert-box success hide-override">
    Success! Your password has been updated.
  </div>

  <div class="row">
    <div class="small-8 columns">
      <div class="row">
        <div class="small-6 columns">
          <label for="current-password" class="right inline">Current Password</label>
        </div>
        <div class="small-6 columns">
          <input type="password" id="current-password" name="currentPassword" required />
        </div>
      </div>

      <div class="row">
        <div class="small-6 columns">
          <label for="new-password" class="right inline">New Password</label>
        </div>
        <div class="small-6 columns">
          <input type="password" id="new-password" name="newPassword" required />
        </div>
      </div>

      <div class="row">
        <div class="small-6 columns">
          <label for="confirm-password" class="right inline">Confirm New Password</label>
        </div>
        <div class="small-6 columns">
          <input type="password" id="confirm-password" name="confirmPassword" required />
        </div>
      </div>

      <div class="row">
        <div class="small-6 small-offset-6 columns">
          <input type="submit" class="button primary small" value="update password" />
        </div>
      </div>
    </div>
  </div>
</form>
{% else %}
<div class="row">
  <div class="small-10 columns">
    You may have used your account from another service (for example, your Google or school account)
    because we don't have a password stored for you.
  </div>
</div>
{% endif %}

{% block extra_js %}
<script type="text/javascript">
$('#change-password').submit(function(event) {
  event.preventDefault();
  $('#new-password').removeClass('input-error');
  $('#confirm-password').removeClass('input-error');
  $('.alert-box').addClass('hide-override');

  if ($('#new-password').val() !== $('#confirm-password').val()) {
    $('#new-password').addClass('input-error');
    $('#confirm-password').addClass('input-error');

    $('#message').text('Your new password entries did not match. Please try again.');
    showAlert("#passwordError");
  }
  else {
    $.ajax({
      url      : '/api/users/password',
      method   : 'POST',
      data     : $(this).serialize(),
      dataType : 'json'
    }).done(function(result) {
      if (result.success) {
        showAlert("#passwordSuccess");
      }
      else if (result.message) {
        $('#message').text(result.message);
        showAlert("#passwordError");
      }
      else {
        $('#message').text('Something went wrong when trying to change your password. Please try again.');
        showAlert("#passwordError");
      }
    }).fail(function(err) {
      $('#message').text('Something went wrong when trying to change your password. Please try again.');
      showAlert("#passwordError");
    });
  }
});
function showAlert(alert) {
  $(alert).removeClass("hide-override");
  setTimeout(function() {
    $(alert).addClass("hide-override");
  }, 5000);
}
</script>
{% endblock %}
