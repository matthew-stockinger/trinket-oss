<form id="editor-settings" method="post">
  <div id="editor-settings-messages"></div>
  <div class="row">
    <div class="small-12 columns">
      <div class="row">
        <div class="small-2 columns">
          <fieldset class="switch small radius" tabindex="0">
            <input id="disable-ace-editor"
                   type="checkbox"
                   name="disableAceEditor"
                   value="{{ user.settings.disableAceEditor }}"
                   aria-checked="{{ user.settings.disableAceEditor }}" {% if user.settings.disableAceEditor %}checked{% endif %}>
            <label for="disable-ace-editor"></label>
          </fieldset>
        </div>
        <div class="small-10 columns">
          <label class="inline inline-lesser">Disable Ace Editor</label>
        </div>
      </div>

      <div class="row">
        <div class="small-2 columns">
          <fieldset class="switch small radius" tabindex="1">
            <input id="lineWrapping"
                   type="checkbox"
                   name="lineWrap"
                   value="{{ user.settings.lineWrapping }}"
                   aria-checked="{{ user.settings.lineWrapping }}" {% if user.settings.lineWrapping %}checked{% endif %}>
            <label for="lineWrapping"></label>
          </fieldset>
        </div>
        <div class="small-10 columns">
          <label class="inline inline-lesser">Line Wrapping Enabled</label>
        </div>
      </div>

      <div class="row">
        <div class="small-2 columns">
          <select id="pythonIndent">
            <option value="2" {% if user.settings.pythonTab == 2 %}selected{% endif %}>2 spaces</option>
            <option value="4" {% if user.settings.pythonTab == 4 %}selected{% endif %}>4 spaces</option>
          </select>
        </div>
        <div class="small-10 columns">
          <label class="inline">Python/Pygame Tab Size</label>
        </div>
      </div>
      <div class="row">
        <div class="small-2 columns">
          <select id="htmlIndent">
            <option value="2" {% if user.settings.htmlTab == 2 %}selected{% endif %}>2 spaces</option>
            <option value="4" {% if user.settings.htmlTab == 4 %}selected{% endif %}>4 spaces</option>
          </select>
        </div>
        <div class="small-10 columns">
          <label class="inline">HTML Tab Size</label>
        </div>
      </div>
      <div class="row">
        <div class="small-2 columns">
          <select id="javaIndent">
            <option value="2" {% if user.settings.javaTab == 2 %}selected{% endif %}>2 spaces</option>
            <option value="4" {% if user.settings.javaTab == 4 %}selected{% endif %}>4 spaces</option>
          </select>
        </div>
        <div class="small-10 columns">
          <label class="inline">Java Tab Size</label>
        </div>
      </div>
      <div class="row">
        <div class="small-2 columns">
          <select id="rIndent">
            <option value="2" {% if user.settings.rTab == 2 %}selected{% endif %}>2 spaces</option>
            <option value="4" {% if user.settings.rTab == 4 %}selected{% endif %}>4 spaces</option>
          </select>
        </div>
        <div class="small-10 columns">
          <label class="inline">R Tab Size</label>
        </div>
      </div>
    </div>
  </div>
</form>

{% block extra_js %}
<script>
  let pythonTab = {{ user.settings.pythonTab }},
      htmlTab   = {{ user.settings.htmlTab   }},
      javaTab   = {{ user.settings.javaTab   }},
      rTab      = {{ user.settings.rTab      }};

  function sendTabSizes() {
    showConfirmation($.post({
      url: '/api/users/settings/indentation',
      data: {
        pythonTab : pythonTab,
        htmlTab   : htmlTab,
        javaTab   : javaTab,
        rTab      : rTab
      }
  }))
  }

  function showConfirmation (response) {
    response.done(function(result) {
      if (result.success) {
        $('#account').notify(
          "Your settings were updated.",
          {position: 'top center', className: 'success'}
        );
      }
      else {
        $('#account').notify(
          "There was a problem updating your settings. Please try again later.",
          {position: 'top center', className: 'alert'}
        );
      }
    }).fail(function(err) {
      $('#account').notify(
        "There was a problem updating your settings. Please try again later.",
        {position: 'top center', className: 'alert'}
      );
    })
  };

  $('#disable-ace-editor').change(function(event) {
    var data = {disableAceEditor: this.checked ? true : false};
    showConfirmation($.post({
        url: '/api/users/settings',
        data: data
    }))
  });

  $('#lineWrapping').change(function(event) {
    var data = {lineWrapping: this.checked ? true : false};
    showConfirmation($.post({
        url: '/api/users/settings/lineWrapping',
        data: data
    }))
  });

  $('#pythonIndent').change(function(event) {
    pythonTab = this.value
    sendTabSizes()
  });

  $('#htmlIndent').change(function(event) {
    htmlTab = this.value
    sendTabSizes()
  });

  $('#javaIndent').change(function(event) {
    javaTab = this.value
    sendTabSizes()
  });

  $('#rIndent').change(function(event) {
    rTab = this.value
    sendTabSizes()
  });
</script>
{% endblock %}
