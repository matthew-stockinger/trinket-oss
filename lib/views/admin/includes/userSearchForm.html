{% if user.loggedInAs() %}
<div class="row">
  <div class="small-12 columns">
    <i class="fa fa-sign-out"></i> <a href="/admin/users?logoutAs={{ user.id }}">Logout as {{ user.username }}</a>
  </div>
</div>
{% else %}
<form id="user-search" action="/admin/users" method="get">
  <div class="row">
    <div class="medium-6 small-10 columns">
      <label for="user-field"> Search by Email, Username, or Role (e.g. role:admin)
        <input id="user-field" type="text" name="q" value="{{ q if q.length else '' }}" />
      </label>
    </div>
  </div>
  <div class="row">
    <div class="medium-6 small-10 columns">
      <input type="submit" class="button primary small" value="Search" />
    </div>
  </div>
</form>
{% endif %}
