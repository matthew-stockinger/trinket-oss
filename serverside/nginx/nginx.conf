worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Python3 manager WebSocket
        location /python3/ {
            set $python3_upstream python3-manager:8100;
            rewrite ^/python3/(.*) /$1 break;
            proxy_pass http://$python3_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Python3 generated files (images, etc.)
        location /python3-generated/ {
            alias /var/www/generated/python/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Java manager WebSocket
        location /java/ {
            set $java_upstream java-manager:8200;
            rewrite ^/java/(.*) /$1 break;
            proxy_pass http://$java_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Java generated files
        location /java-generated/ {
            alias /var/www/generated/java/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # R manager WebSocket
        location /r/ {
            set $r_upstream r-manager:8300;
            rewrite ^/r/(.*) /$1 break;
            proxy_pass http://$r_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # R generated files
        location /r-generated/ {
            alias /var/www/generated/r/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Pygame manager WebSocket
        location /pygame/ {
            set $pygame_upstream pygame-manager:8100;
            rewrite ^/pygame/(.*) /$1 break;
            proxy_pass http://$pygame_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Pygame VNC WebSocket (noVNC)
        location /pygame-vnc/ {
            set $pygame_vnc_upstream pygame-worker:6080;
            rewrite ^/pygame-vnc/(.*) /$1 break;
            proxy_pass http://$pygame_vnc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Pygame generated files
        location /pygame-generated/ {
            alias /var/www/generated/pygame/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }
}
